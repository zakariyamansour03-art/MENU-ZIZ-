<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café ZIZ – Bienvenue chez nous</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #05050a;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ===== SLIDESHOW ===== */
        .slideshow {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            animation: kenBurns 10s ease-in-out infinite alternate;
        }

        .slide.active {
            opacity: 1;
        }

        @keyframes kenBurns {
            0%   { transform: scale(1.08) translateX(0px); }
            100% { transform: scale(1.15) translateX(-20px); }
        }

        /* Each slide gets different Ken Burns direction */
        .slide:nth-child(even) {
            animation-direction: alternate-reverse;
        }

        .slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(5,5,10,0.3) 0%,
                rgba(5,5,10,0.1) 40%,
                rgba(5,5,10,0.6) 80%,
                rgba(5,5,10,0.9) 100%
            );
        }

        /* ===== OVERLAY CONTENT ===== */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* Golden top border line */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #D4AF37, #fff5cc, #D4AF37, transparent);
            z-index: 20;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%   { opacity: 0.7; }
            50%  { opacity: 1; }
            100% { opacity: 0.7; }
        }

        /* Logo area */
        .logo-area {
            margin-bottom: 20px;
            animation: fadeInDown 1.5s ease forwards;
        }

        .logo-area img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.6));
            border-radius: 50%;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Main title */
        .promo-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 900;
            color: #D4AF37;
            letter-spacing: 0.15em;
            text-shadow:
                0 0 30px rgba(212,175,55,0.8),
                0 2px 4px rgba(0,0,0,0.8);
            animation: fadeInMain 2s ease 0.3s both;
            line-height: 1;
            margin-bottom: 10px;
        }

        @keyframes fadeInMain {
            from { opacity: 0; transform: scale(0.85); }
            to   { opacity: 1; transform: scale(1); }
        }

        .promo-sub {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.85rem, 2.5vw, 1.3rem);
            color: rgba(255,255,255,0.85);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            animation: fadeInMain 2s ease 0.7s both;
            margin-bottom: 8px;
        }

        .promo-location {
            font-size: 0.9rem;
            color: #D4AF37;
            letter-spacing: 0.3em;
            animation: fadeInMain 2s ease 1s both;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }

        /* Separator */
        .gold-separator {
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #D4AF37, transparent);
            margin: 25px auto;
            animation: fadeInMain 2s ease 1.2s both;
        }

        /* Captions that change with slides */
        .slide-caption {
            font-size: clamp(1rem, 2vw, 1.4rem);
            color: rgba(255,255,255,0.9);
            font-weight: 300;
            letter-spacing: 0.1em;
            min-height: 40px;
            opacity: 0;
            transition: opacity 0.8s ease;
            font-style: italic;
        }

        .slide-caption.show {
            opacity: 1;
        }

        /* Feature pills */
        .features {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
            animation: fadeInMain 2s ease 1.5s both;
        }

        .feat-pill {
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.4);
            color: #D4AF37;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .feat-pill:hover {
            background: rgba(212,175,55,0.3);
            border-color: #D4AF37;
        }

        /* CTA Button */
        .cta-container {
            margin-top: 40px;
            animation: fadeInMain 2s ease 2s both;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #D4AF37, #f5d980, #D4AF37);
            background-size: 200% auto;
            color: #000;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border-radius: 3px;
            transition: all 0.4s ease;
            box-shadow: 0 0 30px rgba(212,175,55,0.4);
            animation: pulse-cta 2.5s ease infinite;
        }

        .cta-btn:hover {
            background-position: right center;
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(212,175,55,0.7);
        }

        @keyframes pulse-cta {
            0%   { box-shadow: 0 0 20px rgba(212,175,55,0.3); }
            50%  { box-shadow: 0 0 50px rgba(212,175,55,0.6); }
            100% { box-shadow: 0 0 20px rgba(212,175,55,0.3); }
        }

        .cta-whatsapp {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            transition: color 0.3s;
        }

        .cta-whatsapp:hover { color: #25D366; }

        /* ===== SLIDE DOTS ===== */
        .dots {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1.5px solid rgba(212,175,55,0.5);
            background: transparent;
            cursor: pointer;
            transition: all 0.4s;
        }

        .dot.active {
            background: #D4AF37;
            border-color: #D4AF37;
            width: 28px;
            border-radius: 4px;
        }

        /* ===== CORNER ORNAMENTS ===== */
        .corner {
            position: fixed;
            width: 60px;
            height: 60px;
            border-color: rgba(212,175,55,0.4);
            border-style: solid;
            z-index: 20;
        }

        .corner-tl { top: 15px; left: 15px; border-width: 2px 0 0 2px; }
        .corner-tr { top: 15px; right: 15px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: 55px; left: 15px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: 55px; right: 15px; border-width: 0 2px 2px 0; }

        /* ===== BACK LINK ===== */
        .back-link {
            position: fixed;
            top: 20px;
            left: 25px;
            color: rgba(212,175,55,0.7);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }

        .back-link:hover { color: #D4AF37; }

        /* Responsive */
        @media (max-height: 600px) {
            .logo-area img { width: 60px; height: 60px; }
            .promo-title { font-size: 3rem; }
            .gold-separator { margin: 12px auto; }
            .features { margin-top: 15px; }
            .cta-container { margin-top: 20px; }
        }
    </style>
</head>
<body>

    <!-- CORNER ORNAMENTS -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="top-bar"></div>

    <!-- BACK TO MENU -->
    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> MENU
    </a>

    <!-- SLIDESHOW -->
    <div class="slideshow" id="slideshow">
        <div class="slide active" style="background-image: url('galerie_1.png')"></div>
        <div class="slide" style="background-image: url('galerie_2.png')"></div>
        <div class="slide" style="background-image: url('galerie_3.png')"></div>
        <div class="slide" style="background-image: url('galerie_4.png')"></div>
        <div class="slide" style="background-image: url('galerie_5.png')"></div>
    </div>

    <!-- MAIN OVERLAY -->
    <div class="overlay">
        <div class="logo-area">
            <img src="logo.png" alt="Logo Café ZIZ">
        </div>

        <div class="promo-title">CAFÉ ZIZ</div>
        <div class="promo-sub">Restaurant – Café – Terrasse</div>
        <div class="promo-location">
            <i class="fas fa-map-marker-alt"></i> Azilal, Maroc
        </div>

        <div class="gold-separator"></div>

        <div class="slide-caption" id="caption">Un espace unique, une expérience inoubliable</div>

        <div class="features">
            <span class="feat-pill"><i class="fas fa-star"></i> Qualité Premium</span>
            <span class="feat-pill"><i class="fas fa-motorcycle"></i> Livraison Gratuite</span>
            <span class="feat-pill"><i class="fas fa-utensils"></i> Cuisine Raffinée</span>
        </div>

        <div class="cta-container">
            <a href="index.html" class="cta-btn">
                <i class="fas fa-book-open"></i> Voir le Menu
            </a>
            <a href="https://wa.me/212607350118" target="_blank" class="cta-whatsapp">
                <i class="fab fa-whatsapp"></i> Commander via WhatsApp
            </a>
        </div>
    </div>

    <!-- SLIDE DOTS -->
    <div class="dots" id="dots"></div>

    <script>
        const slides = document.querySelectorAll('.slide');
        const captionEl = document.getElementById('caption');
        const dotsEl = document.getElementById('dots');

        const captions = [
            'Une ambiance chaleureuse qui vous accueille avec soin ☕',
            'Un espace élégant inspiré de l\'architecture marocaine ✨',
            'Des détails raffinés pour une expérience hors du commun 🌟',
            'Un cadre lumineux et confortable pour tous les moments 🕯️',
            'L\'endroit idéal pour se retrouver, partager et savourer 🍽️'
        ];

        let current = 0;

        // Build dots
        slides.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'dot' + (i === 0 ? ' active' : '');
            dot.onclick = () => goTo(i);
            dotsEl.appendChild(dot);
        });

        function goTo(n) {
            slides[current].classList.remove('active');
            dotsEl.children[current].classList.remove('active');

            current = n;

            slides[current].classList.add('active');
            dotsEl.children[current].classList.add('active');

            // Animate caption
            captionEl.classList.remove('show');
            setTimeout(() => {
                captionEl.textContent = captions[current];
                captionEl.classList.add('show');
            }, 400);
        }

        // Show first caption
        setTimeout(() => {
            captionEl.textContent = captions[0];
            captionEl.classList.add('show');
        }, 500);

        // Auto-advance every 5 seconds
        setInterval(() => {
            goTo((current + 1) % slides.length);
        }, 5000);
    </script>

</body>
</html>
