<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Visite - Café ZIZ Azilal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --green-deep: #052c14;
            --green-primary: #0a4d22;
            --green-glow: #1a6d35;
            --gold-metallic: linear-gradient(135deg, #a67c00 0%, #ffbf00 50%, #a67c00 100%);
            --gold-border: #d4af37;
            --white: #ffffff;
            --text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Amiri:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        .card {
            width: 650px;
            height: 380px;
            background: var(--green-deep);
            position: relative;
            border-radius: 8px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.4);
        }

        /* --- BACKGROUND EFFECTS --- */
        /* Central Glow */
        .card::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
            opacity: 0.6;
            pointer-events: none;
        }

        /* Light Rays (Burst) */
        .rays {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            transform: translate(-50%, -50%);
            background: repeating-conic-gradient(
                from 0deg,
                rgba(255, 255, 255, 0.03) 0deg 3deg,
                transparent 3deg 10deg
            );
            pointer-events: none;
            z-index: 1;
        }

        /* Sparkling elements */
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05) 1px, transparent 1px),
                        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05) 1px, transparent 1px),
                        radial-gradient(circle at 50% 10%, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 100px 100px;
        }

        /* --- LOGO SECTION --- */
        .logo-section {
            display: flex;
            justify-content: center;
            z-index: 5;
            margin-top: -10px;
        }

        .gold-emblem {
            width: 155px;
            height: 155px;
            border-radius: 50%;
            background: rgba(0,0,0,0.3);
            border: 4px solid var(--gold-border);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .gold-emblem::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border: 1px solid var(--gold-border);
            border-radius: 50%;
            opacity: 0.5;
        }

        .stag-icon {
            font-size: 65px;
            background: var(--gold-metallic);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.4));
        }

        .emblem-text-svg {
            position: absolute;
            width: 150px;
            height: 150px;
        }

        .emblem-text-svg text {
            fill: var(--gold-border);
            font-size: 10.5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- BOTTOM AREA --- */
        .bottom-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 5;
            width: 100%;
        }

        /* QR Code */
        .qr-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .scan-tag {
            background: #000;
            border: 1px solid var(--gold-border);
            color: var(--gold-border);
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .qr-border {
            background: var(--white);
            padding: 8px;
            border: 3px solid var(--gold-border);
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .qr-border img { display: block; }

        /* Typography */
        .info-wrap {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .fr-welcome {
            color: var(--white);
            font-size: 20px;
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: var(--text-shadow);
        }

        .ar-welcome {
            font-family: 'Amiri', serif;
            color: var(--white);
            font-size: 24px;
            font-weight: 700;
            direction: rtl;
            margin-top: 4px;
            text-shadow: var(--text-shadow);
        }

        /* --- PRINT UTILS --- */
        .actions {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
        }

        .btn-print {
            background: var(--gold-metallic);
            color: #000;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-print:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        @media print {
            .actions { display: none; }
            body { background: white; padding: 0; }
            .card {
                box-shadow: none;
                margin: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Decoration -->
        <div class="rays"></div>
        <div class="sparkles"></div>

        <!-- Logo -->
        <div class="logo-section">
            <div class="gold-emblem">
                <svg class="emblem-text-svg" viewBox="0 0 100 100">
                    <path id="circle" d="M 50, 50 m -42, 0 a 42,42 0 1,1 84,0 a 42,42 0 1,1 -84,0" fill="none" />
                    <text>
                        <textPath href="#circle" startOffset="0%">
                            CAFÉ RESTAURATION • ZIZ AZILAL •
                        </textPath>
                    </text>
                </svg>
                <!-- Stylized Deer/Stag icon for ZIZ -->
                <i class="fas fa-hat-cowboy stag-icon" style="transform: scaleX(-1);"></i> 
            </div>
        </div>

        <!-- Bottom Info -->
        <div class="bottom-area">
            <div class="qr-wrap">
                <div class="scan-tag">
                    <i class="fas fa-qrcode"></i> SCAN ME
                </div>
                <div class="qr-border">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://yzkluxurygroupe-rgb.github.io/MENU-ZIZ-/&color=052c14&bgcolor=FFFFFF" alt="QR" width="90" height="90">
                </div>
            </div>

            <div class="info-wrap">
                <div class="fr-welcome">BIENVENUE EN<br>ESPACE ZIZ AZILAL</div>
                <div class="ar-welcome">مرحبا بكم في فضاء زيز أزيلال</div>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="btn-print" onclick="window.print()">
            <i class="fas fa-print"></i> IMPRIMER LA CARTE VISITE
        </button>
    </div>

</body>
</html>
