<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie Photos - Café ZIZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="menu-wrapper">
        <div class="menu-border">
            
            <!-- EN-TÊTE GALERIE -->
            <header class="menu-header">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px;">
                    <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> <span data-i18n="back_menu">Retour au Menu</span></a>
                </div>
                <h1 class="logo" style="font-size: 3rem;">GALERIE PHOTOS</h1>
                <p class="subtitle" data-i18n="gallery_subtitle">Découvrez notre espace et nos délices</p>
                <div class="separator-lg"></div>
            </header>

            <!-- GRILLE DE PHOTOS -->
            <div class="gallery-grid">
                <!-- Les images seront remplacées par les vraies photos du client -->
                <div class="gallery-item">
                    <img src="galerie_1.png" alt="Intérieur Café ZIZ">
                </div>
                <div class="gallery-item">
                    <img src="galerie_2.png" alt="Ambiance Café ZIZ">
                </div>
                <div class="gallery-item">
                    <img src="galerie_3.png" alt="Café ZIZ">
                </div>
                <div class="gallery-item">
                    <img src="galerie_4.png" alt="Moment Café ZIZ">
                </div>
                <div class="gallery-item">
                    <img src="galerie_5.png" alt="Espace Café ZIZ">
                </div>
                <!-- Nouvelles photos de Facebook/Instagram -->
                <div class="gallery-item">
                    <img src="images.jfif" alt="Intérieur Café ZIZ">
                </div>
                <div class="gallery-item">
                    <img src="images (4).jfif" alt="Café ZIZ de nuit">
                </div>
                <div class="gallery-item">
                    <img src="images (3).jfif" alt="Plat de délices Café ZIZ">
                </div>
                <div class="gallery-item">
                    <img src="images(2).jfif" alt="Burger Café ZIZ">
                </div>
                <div class="gallery-item">
                    <img src="WhatsApp Image 2026-05-04 at 14.59.00.jpeg" alt="Pizza & Tacos Café ZIZ">
                </div>
                <!-- Vidéo WhatsApp -->
                <div class="gallery-item">
                    <video controls>
                        <source src="WhatsApp Video 2026-03-01 at 05.08.19.mp4" type="video/mp4">
                        Votre navigateur ne supporte pas la balise vidéo.
                    </video>
                </div>
                <!-- Vous pouvez ajouter plus d'images ici -->
            </div>

            <div class="separator-lg" style="margin-top: 40px; margin-bottom: 30px;"></div>
            
            <!-- PIED DE MENU -->
            <footer class="menu-footer">
                <div class="slogan-container">
                    <p class="slogan" data-i18n="slogan">Qualité – Goût – Service</p>
                    <div class="socials">
                        <a href="https://www.facebook.com/profile.php?id=61587702085567" target="_blank" title="Facebook Café ZIZ"><i class="fab fa-facebook-f"></i></a>
                        <a href="https://www.instagram.com/station_restaurant_ziz?igsh=MXFtaHEzbTh1YmVvZw==" target="_blank" title="Instagram Café ZIZ"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </footer>
            
        </div>
    </div>
    
    <script src="translate.js"></script>
    <script>
        // Set the language from local storage if available, otherwise default to fr
        document.addEventListener('DOMContentLoaded', () => {
            const currentLang = localStorage.getItem('cafeZizLang') || 'fr';
            if (typeof setLanguage === 'function') {
                setLanguage(currentLang);
            }
        });
    </script>
</body>
</html>
